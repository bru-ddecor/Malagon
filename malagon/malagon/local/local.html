<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="local.css" />
    <title>Document</title>
  </head>

  <body>
    <!-- OVERLAY -->
    <div class="overlay"></div>

    <!-- NAVBAR -->
    <div class="nav">
      <div class="logo">Malagon</div>

      <div class="links">
        <a href="../home/home.html">Home</a>
        <a href="#">Localização</a>
        <a href="../financeiro/financeiro.html">Financeiro</a>

        <a href="../login/login.html">Login</a>

    <!-- Container Principal -->
    <div class="container">
      <div class="card1">
        <p class="route">ROUTE PROTOCOL</p>
        <h1>Configurações Locais</h1>
        <p class="subtitle">
          Informe seu país de origem e onde deseja ir para começar a simular
        </p>

        <!-- NOVO WRAPPER - Para facilitar mexer no card -->
        <div class="selection-wrapper">
          <div class="localizacao">
            <!-- Timeline Vertical -->
            <div class="timeline">
              <div class="point origin"></div>
              <div class="line2"></div>
              <div class="lined1"></div>
              <div class="point destination"></div>
            </div>

            <!-- Card de Origem + Destino -->
            <div class="infocard_1">
              <div class="info-group">
                <span class="label">ORIGEM</span>
                <div class="card">
                  <select id="origem">
                      <option>São Paulo, Brasil</option>
                    <option>Rio de Janeiro, Brasil</option>
                    <option>Lisboa, Portugal</option>
                    <option>Porto, Portugal</option>
                   <option>São Paulo, Brasil</option> 
  <option>Nova York, EUA</option>
    <option>Toronto, Canadá</option>
    <option>Cidade do México, México</option>
    <option>Londres, Reino Unido</option>
    <option>Paris, França</option>
    <option>Madri, Espanha</option>
    <option>Málaga, Espanha</option>
    <option>Lisboa, Portugal</option>
    <option>Berlim, Alemanha</option>
    <option>Roma, Itália</option>
    <option>Atenas, Grécia</option>
    <option>Tóquio, Japão</option>
    <option>Seul, Coreia do Sul</option>
    <option>Pequim, China</option>
    <option>Bangkok, Tailândia</option>
    <option>Dubai, Emirados Árabes</option>
    <option>Cairo, Egito</option>
    <option>Cidade do Cabo, África do Sul</option>
    <option>Sydney, Austrália</option>
                  </select>
                </div>
              </div>

              <button class="swap-btn" onclick="trocarLocais()">⇄</button>

              <div class="info-group">
                <span class="label">DESTINO</span>
                <div class="card">
                  <select id="destino">
                    <option>São Paulo, Brasil</option>
                    <option>Rio de Janeiro, Brasil</option>
                    <option>Lisboa, Portugal</option>
                    <option>Porto, Portugal</option>
                   <option>São Paulo, Brasil</option> 
  <option>Nova York, EUA</option>
    <option>Toronto, Canadá</option>
    <option>Cidade do México, México</option>
    <option>Londres, Reino Unido</option>
    <option>Paris, França</option>
    <option>Madri, Espanha</option>
    <option>Málaga, Espanha</option>
    <option>Lisboa, Portugal</option>
    <option>Berlim, Alemanha</option>
    <option>Roma, Itália</option>
    <option>Atenas, Grécia</option>
    <option>Tóquio, Japão</option>
    <option>Seul, Coreia do Sul</option>
    <option>Pequim, China</option>
    <option>Bangkok, Tailândia</option>
    <option>Dubai, Emirados Árabes</option>
    <option>Cairo, Egito</option>
    <option>Cidade do Cabo, África do Sul</option>
    <option>Sydney, Austrália</option>
</select> 
                  </select>
                </div>
              </div>

              <button class="confirmar" onclick="atualizarMapa()">
                Confirmar Seleção →
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="infocard_3">
  <h1>Travel Time</h1>
   <p id="travelTime">--</p>
    </div>
    <!--Card distancia estimada-->
   <div class="infocard_2">
    <h1>Estimated Distance</h1>
    <p id="distance">0 Km</p>
</div>
    <div class="map-card">
      <div id="map"></div>
    </div>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
